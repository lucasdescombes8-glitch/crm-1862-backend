version: '3.9'

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: crm-1862-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_1862_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: crm-1862-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ============================================================================
  # Backend API Server
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-1862-api
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/crm_1862_dev"
      REDIS_URL: "redis://redis:6379"
      PORT: 5000
      JWT_SECRET: "dev-secret-key-change-in-production"
      CORS_ORIGIN: "http://localhost:3741"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run dev
    networks:
      - crm-network

  # ============================================================================
  # Adminer (Database UI)
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: crm-1862-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - crm-network

volumes:
  postgres_data:

networks:
  crm-network:
    driver: bridge
